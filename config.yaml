watch:
  enabled: true
  directories:
    - "/Users/joostokkinga/Documents/AutoTranscribe2/recordings"
  include_extensions: [".m4a", ".mp3", ".wav"]
  exclude_patterns: []
  polling_interval_seconds: 10
  output_directory: "/Users/joostokkinga/Documents/AutoTranscribe2/transcripts"
  mirror_source_structure: true

backend:
  type: "mlx_whisper"
  python_executable: "/Users/joostokkinga/Code/AutoTranscribe2/.venv/bin/python"
  script_path: "./py-backend/mlx_whisper_backend.py"
  language_hint: null
  options:
    model_size: "medium"

logging:
  level: "info"
  log_file: "/Users/joostokkinga/Documents/AutoTranscribe2/logs/autotranscribe.log"
  console: true
  verbose_errors: false

