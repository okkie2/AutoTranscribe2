watch:
  enabled: true
  directories:
    - "/Users/joostokkinga/Documents/AutoTranscribe2/recordings"
  include_extensions: [".m4a", ".mp3", ".wav"]
  exclude_patterns: []
  polling_interval_seconds: 10
  output_directory: "/Users/joostokkinga/Documents/AutoTranscribe2/transcripts"
  mirror_source_structure: true

backend:
  type: "mlx_whisper"
  python_executable: "/Users/joostokkinga/Code/AutoTranscribe2/.venv/bin/python"
  script_path: "./py-backend/mlx_whisper_backend.py"
  language_hint: null
  options:
    model_size: "medium"

logging:
  level: "info"
  log_file: "/Users/joostokkinga/Documents/AutoTranscribe2/logs/autotranscribe.log"
  console: true
  verbose_errors: false

title:
  enabled: true
  provider: "ollama" # "ollama" | "heuristic" | "none"
  max_length: 80
  max_words: 5
  language_hint: null
  ollama:
    endpoint: "http://127.0.0.1:11434/api/generate"
    model: "llama3.1:8b-instruct-q4_K_M"
    temperature: 0.2
    timeout_ms: 20000

ingest:
  jpr_source_root: "/Users/joostokkinga/Library/Mobile Documents/iCloud~com~openplanetsoftware~just-press-record/Documents"
  recordings_root: "/Users/joostokkinga/Documents/AutoTranscribe2/recordings"

autostart:
  enabled: true
  label: "com.autotranscribe2.startall"

